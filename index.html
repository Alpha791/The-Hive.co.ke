<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TheHive Kenya</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
padding-bottom:100px;
}

.glass{
background:rgba(255,255,255,0.95);
backdrop-filter:blur(10px);
border-radius:20px;
}

.product-card{
background:white;
border-radius:20px;
overflow:hidden;
transition:.3s;
}

.product-card:hover{
transform:translateY(-5px);
}

.mobile-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:15px;
z-index:1000;
border-radius:20px 20px 0 0;
}

.page{
display:none;
}

.active-page{
display:block;
}

video{
width:100%;
border-radius:20px;
background:black;
height:300px;
object-fit:cover;
}

.toast{
position:fixed;
bottom:100px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:10px 20px;
border-radius:50px;
z-index:2000;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<div class="max-w-7xl mx-auto p-4">

<div class="glass p-4 mb-6 flex justify-between items-center">

<div class="flex items-center gap-3">
<div class="bg-purple-600 p-3 rounded-xl">
<i class="fas fa-store text-white text-2xl"></i>
</div>

<h1 class="text-2xl font-bold">
TheHive<span class="text-purple-600">Kenya</span>
</h1>
</div>

<div class="hidden md:flex gap-3">

<button onclick="showPage('home')" class="bg-purple-600 text-white px-5 py-2 rounded-full">
Home
</button>

<button onclick="openMarket()" class="bg-gray-200 px-5 py-2 rounded-full">
Market
</button>

<button onclick="openLive()" class="bg-gray-200 px-5 py-2 rounded-full seller-only hidden">
Live
</button>

<button onclick="showPage('profile')" class="bg-gray-200 px-5 py-2 rounded-full">
Profile
</button>

</div>

</div>

<div id="home" class="page active-page">

<div class="glass p-8 text-center mb-6">

<h2 class="text-4xl font-bold mb-3">
Welcome To TheHive Kenya
</h2>

<p class="text-gray-600 mb-6">
Modern Marketplace With Live Video Selling
</p>

<div class="flex justify-center gap-4 flex-wrap">

<button onclick="openMarket()" class="bg-purple-600 text-white px-6 py-3 rounded-full">
Explore Products
</button>

<button onclick="openLive()" class="bg-pink-600 text-white px-6 py-3 rounded-full seller-only hidden">
Start Selling
</button>

</div>

</div>

</div>

<div id="market" class="page">

<div class="glass p-5 mb-5">

<div class="flex flex-wrap justify-between gap-4">

<h2 class="text-2xl font-bold">
Marketplace
</h2>

<input
type="text"
id="searchInput"
placeholder="Search..."
class="border px-4 py-2 rounded-full"
oninput="renderProducts()"
>

</div>

</div>

<div id="productsContainer" class="grid md:grid-cols-3 lg:grid-cols-4 gap-5"></div>

</div>

<div id="live" class="page">

<div class="glass p-6">

<h2 class="text-2xl font-bold text-center mb-5">
Live Video Studio
</h2>

<div id="liveAuthRequired" class="text-center">

<p class="mb-4">
Login as seller to continue
</p>

<button onclick="showPage('profile')" class="bg-purple-600 text-white px-6 py-2 rounded-full">
Go To Profile
</button>

</div>

<div id="liveStudio" class="hidden">

<video id="video" autoplay playsinline muted></video>

<div class="flex gap-3 justify-center mt-5 flex-wrap">

<button onclick="switchCamera()" class="bg-gray-800 text-white px-5 py-2 rounded-full">
Switch Camera
</button>

<button id="startBtn" onclick="startLive()" class="bg-red-600 text-white px-5 py-2 rounded-full">
Start Live
</button>

<button id="stopBtn" onclick="stopLive()" class="bg-gray-700 text-white px-5 py-2 rounded-full hidden">
Stop Live
</button>

</div>

<div class="mt-5 text-center">
<p id="liveStatus">⚫ Offline</p>
</div>

</div>

</div>

</div>

<div id="profile" class="page">

<div class="glass p-6">

<h2 class="text-2xl font-bold mb-6">
Account
</h2>

<div id="loggedOut">

<div class="text-center">

<button onclick="registerUser()" class="bg-green-600 text-white px-6 py-2 rounded-full">
Register
</button>

<button onclick="loginUser()" class="bg-purple-600 text-white px-6 py-2 rounded-full ml-3">
Login
</button>

</div>

</div>

<div id="loggedIn" class="hidden">

<div class="text-center">

<h3 id="userName" class="text-xl font-bold"></h3>

<p id="userRole" class="text-purple-600 mt-2"></p>

<p id="userPhone" class="text-gray-500 mt-1"></p>

<button onclick="logoutUser()" class="bg-red-600 text-white px-5 py-2 rounded-full mt-4">
Logout
</button>

</div>

<div id="sellerPanel" class="hidden mt-6">

<button onclick="addProduct()" class="bg-green-600 text-white px-5 py-2 rounded-full w-full">
Add Product
</button>

<div id="myProducts" class="mt-5 space-y-3"></div>

</div>

</div>

</div>

</div>

</div>

<div class="mobile-nav md:hidden">

<button onclick="showPage('home')">
<i class="fas fa-home text-2xl"></i>
</button>

<button onclick="openMarket()">
<i class="fas fa-store text-2xl"></i>
</button>

<button onclick="openLive()" class="seller-only hidden">
<i class="fas fa-video text-2xl"></i>
</button>

<button onclick="showPage('profile')">
<i class="fas fa-user text-2xl"></i>
</button>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDBVNHvRHyPd5g7wC-5ivadmSdUqZhJnws",
authDomain: "hive-e919c.firebaseapp.com",
projectId: "hive-e919c",
storageBucket: "hive-e919c.firebasestorage.app",
messagingSenderId: "630469771750",
appId: "1:630469771750:web:4caa2b65798db950ce5627"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let currentRole = null;
let stream = null;
let currentCamera = 'user';

function toast(message){

const old=document.querySelector('.toast');

if(old) old.remove();

const div=document.createElement('div');

div.className='toast';

div.innerText=message;

document.body.appendChild(div);

setTimeout(()=>{
div.remove();
},3000);

}

function showPage(page){

document.querySelectorAll('.page').forEach(p=>{
p.classList.remove('active-page');
});

document.getElementById(page).classList.add('active-page');

}

function updateSellerUI(){

document.querySelectorAll('.seller-only').forEach(el=>{

if(currentRole==='seller'){
el.classList.remove('hidden');
}else{
el.classList.add('hidden');
}

});

}

async function registerUser(){

const role=prompt('seller or buyer');

if(!role) return;

const email=prompt('Email');

const password=prompt('Password');

const fullName=prompt('Full Name');

const mobile=prompt('Phone Number');

let storeName='';

if(role==='seller'){
storeName=prompt('Store Name');
}

try{

const userCredential=await auth.createUserWithEmailAndPassword(email,password);

const uid=userCredential.user.uid;

if(role==='seller'){

await db.collection('sellers').doc(uid).set({
email,
full_name:fullName,
mobile,
store_name:storeName,
role:'seller'
});

}else{

await db.collection('buyers').doc(uid).set({
email,
full_name:fullName,
mobile,
role:'buyer'
});

}

toast('Registration successful');

}catch(error){

alert(error.message);

}

}

async function loginUser(){

const email=prompt('Email');

const password=prompt('Password');

if(!email || !password) return;

try{

await auth.signInWithEmailAndPassword(email,password);

toast('Login successful');

}catch(error){

alert(error.message);

}

}

async function logoutUser(){

await auth.signOut();

toast('Logged out');

}

auth.onAuthStateChanged(async(user)=>{

if(user){

const sellerDoc=await db.collection('sellers').doc(user.uid).get();

const buyerDoc=await db.collection('buyers').doc(user.uid).get();

if(sellerDoc.exists){

const data=sellerDoc.data();

currentUser=data;

currentRole='seller';

document.getElementById('loggedOut').classList.add('hidden');

document.getElementById('loggedIn').classList.remove('hidden');

document.getElementById('sellerPanel').classList.remove('hidden');

document.getElementById('userName').innerText=data.store_name;

document.getElementById('userRole').innerText='Seller Account';

document.getElementById('userPhone').innerText=data.mobile;

updateSellerUI();

showPage('live');

document.getElementById('liveAuthRequired').classList.add('hidden');

document.getElementById('liveStudio').classList.remove('hidden');

loadSellerProducts();

}

else if(buyerDoc.exists){

const data=buyerDoc.data();

currentUser=data;

currentRole='buyer';

document.getElementById('loggedOut').classList.add('hidden');

document.getElementById('loggedIn').classList.remove('hidden');

document.getElementById('sellerPanel').classList.add('hidden');

document.getElementById('userName').innerText=data.full_name;

document.getElementById('userRole').innerText='Buyer Account';

document.getElementById('userPhone').innerText=data.mobile;

updateSellerUI();

openMarket();

}

}else{

currentUser=null;

currentRole=null;

document.getElementById('loggedOut').classList.remove('hidden');

document.getElementById('loggedIn').classList.add('hidden');

updateSellerUI();

showPage('home');

}

});

async function loadProducts(){

const snapshot=await db.collection('products').get();

window.products=[];

snapshot.forEach(doc=>{

window.products.push({
id:doc.id,
...doc.data()
});

});

renderProducts();

}

function renderProducts(){

const container=document.getElementById('productsContainer');

const search=document.getElementById('searchInput').value.toLowerCase();

const filtered=window.products.filter(p=>p.name.toLowerCase().includes(search));

if(filtered.length===0){

container.innerHTML='<p class="text-white">No products found</p>';

return;

}

container.innerHTML=filtered.map(product=>`

<div class="product-card p-4">

<img src="${product.image}" class="w-full h-48 object-cover rounded-lg mb-3">

<h3 class="font-bold text-lg">${product.name}</h3>

<p class="text-gray-500">${product.description}</p>

<div class="flex justify-between items-center mt-3">

<span class="text-purple-600 font-bold">
KES ${product.price}
</span>

</div>

</div>

`).join('');

}

async function addProduct(){

const name=prompt('Product Name');

const description=prompt('Description');

const price=prompt('Price');

const image=prompt('Image URL');

if(!name || !price) return;

await db.collection('products').add({
name,
description,
price,
image,
seller:currentUser.store_name,
sellerId:auth.currentUser.uid
});

toast('Product Added');

loadProducts();

loadSellerProducts();

}

async function loadSellerProducts(){

const snapshot=await db.collection('products')
.where('sellerId','==',auth.currentUser.uid)
.get();

const container=document.getElementById('myProducts');

container.innerHTML='';

snapshot.forEach(doc=>{

const product=doc.data();

container.innerHTML+=`

<div class="bg-gray-100 p-3 rounded-lg flex justify-between">

<div>
<p class="font-bold">${product.name}</p>
<p>KES ${product.price}</p>
</div>

<button onclick="deleteProduct('${doc.id}')" class="text-red-600">
<i class="fas fa-trash"></i>
</button>

</div>

`;

});

}

async function deleteProduct(id){

await db.collection('products').doc(id).delete();

toast('Product Deleted');

loadProducts();

loadSellerProducts();

}

function openMarket(){

showPage('market');

loadProducts();

}

function openLive(){

if(currentRole!=='seller'){

alert('Only sellers can access live studio');

showPage('profile');

return;

}

showPage('live');

document.getElementById('liveAuthRequired').classList.add('hidden');

document.getElementById('liveStudio').classList.remove('hidden');

}

async function startLive(){

try{

stream=await navigator.mediaDevices.getUserMedia({
video:{
facingMode:currentCamera
},
audio:true
});

document.getElementById('video').srcObject=stream;

document.getElementById('liveStatus').innerText='🔴 LIVE NOW';

document.getElementById('startBtn').classList.add('hidden');

document.getElementById('stopBtn').classList.remove('hidden');

toast('Live Started');

}catch(error){

alert('Camera permission denied');

}

}

function stopLive(){

if(stream){

stream.getTracks().forEach(track=>track.stop());

}

document.getElementById('video').srcObject=null;

document.getElementById('liveStatus').innerText='⚫ Offline';

document.getElementById('startBtn').classList.remove('hidden');

document.getElementById('stopBtn').classList.add('hidden');

toast('Live Ended');

}

async function switchCamera(){

currentCamera=currentCamera==='user' ? 'environment' : 'user';

if(stream){

stopLive();

await startLive();

}

toast(currentCamera==='user' ? 'Front Camera' : 'Back Camera');

}

document.addEventListener('contextmenu',(e)=>{
e.preventDefault();
});

</script>

</body>
</html>
